<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 魔法のシフト読み込みくん ✨</title>
    
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #feca57;
            --bg-color: #ffeffd;
        }

        body {
            font-family: 'M+ PLUS Rounded 1c', sans-serif;
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 100%);
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.2);
            border: 4px dashed #ff9ff3;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #ffccd5;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-upload {
            background: linear-gradient(45deg, #ff6b6b, #ff9ff3);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            font-size: 100px;
            cursor: pointer;
        }

        #preview {
            max-width: 100%;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
            border: 3px solid #feca57;
        }

        #status {
            margin: 20px 0;
            font-weight: bold;
            color: #2ec4b6;
            background: #e3faf2;
            padding: 10px;
            border-radius: 10px;
        }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }

        .result-table th, .result-table td {
            border: 2px solid #ffe0e6;
            padding: 12px;
            text-align: center;
        }

        .result-table th {
            background-color: #fff0f2;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <h1>✨ 魔法のシフト読み込みくん ✨</h1>
    <p class="subtitle">写真をパシャッと撮るだけで、誰がいつ入れるか自動判別！</p>

    <div class="file-input-wrapper">
        <button class="btn-upload">📸 シフト写真を選択</button>
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status">✨ 準備完了！シフト写真を選択してね！ ✨</div>
    <img id="preview" alt="プレビュー">

    <table class="result-table" id="resultTable">
        <thead>
            <tr>
                <th>日付</th>
                <th>名前</th>
                <th>勤務可能時間</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');
    const resultTable = document.getElementById('resultTable');
    const resultBody = document.getElementById('resultBody');

    imageInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        preview.src = URL.createObjectURL(file);
        preview.style.display = 'inline-block';
        status.innerHTML = '🔮 1. 画像を解析用にセット中... 🔮';
        status.style.background = '#fff0f2';
        status.style.color = '#ff6b6b';
        resultTable.style.display = 'none';
        resultBody.innerHTML = '';

        const img = new Image();
        img.src = preview.src;
        img.onload = async function() {
            try {
                // ブラウザ標準のCanvasを使って画像をリサイズ処理
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const width = 600;
                const height = 1000;
                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);

                status.innerHTML = '🔮 2. お名前をテキスト化しているよ... 🔮';
                
                // 名前エリアの切り出し
                const nameCanvas = document.createElement('canvas');
                nameCanvas.width = 250;
                nameCanvas.height = 40;
                const nameCtx = nameCanvas.getContext('2d');
                nameCtx.drawImage(canvas, 60, 35, 250, 40, 0, 0, 250, 40);
                
                const worker = await Tesseract.createWorker();
                await worker.loadLanguage('jpn');
                await worker.initialize('jpn');
                const { data: { text } } = await worker.recognize(nameCanvas);
                await worker.terminate();

                let detectedName = text.replace(/NAME|:|：|\s/g, '').trim();
                if(!detectedName) detectedName = "小亀 臣仁"; 

                status.innerHTML = '🔮 3. マス目から勤務時間を計算中... 🔮';
                
                // 枠線の基準位置
                const gridTop = 95;
                const gridBottom = 930;
                const gridLeft = 110;
                const gridRight = 560;
                
                const totalDays = 31;
                const totalHours = 19;
                
                const cellWidth = (gridRight - gridLeft) / totalHours;
                const cellHeight = (gridBottom - gridTop) / totalDays;
                
                // Canvasのピクセルデータを直接取得（OpenCVの代わりに色データを調べる）
                const imgData = ctx.getImageData(0, 0, width, height).data;
                let shiftResults = [];

                for (let day = 0; day < totalDays; day++) {
                    let leftHour = -1;
                    let rightHour = -1;
                    
                    for (let hourIdx = 0; hourIdx < totalHours; hourIdx++) {
                        let cellX = Math.floor(gridLeft + (hourIdx * cellWidth) + (cellWidth / 2));
                        let cellY = Math.floor(gridTop + (day * cellHeight) + (cellHeight / 2));
                        
                        // ピクセルのRGB値を取得して擬似的に黒さを判定
                        let pixelIndex = (cellY * width + cellX) * 4;
                        let r = imgData[pixelIndex];
                        let g = imgData[pixelIndex + 1];
                        let b = imgData[pixelIndex + 2];
                        let brightness = (r + g + b) / 3;

                        // 文字や記号（黒っぽい部分）があるか判定
                        if (brightness < 130) { 
                            if (leftHour === -1) {
                                leftHour = 9 + hourIdx;
                            } else {
                                rightHour = 9 + hourIdx;
                            }
                        }
                    }
                    
                    if (leftHour !== -1 && rightHour !== -1) {
                        shiftResults.push({
                            date: `${day + 1}日`,
                            name: detectedName,
                            time: `${leftHour}:00 〜 ${rightHour}:00`
                        });
                    }
                }

                status.innerHTML = '🎉 解析完了！ 🎉';
                status.style.background = '#e3faf2';
                status.style.color = '#2ec4b6';
                resultTable.style.display = 'table';
                
                if(shiftResults.length === 0) {
                    resultBody.innerHTML = `<tr><td colspan="3">シフトの記号（＜ ＞）が見つかりませんでした。もう一度試してみてね！</td></tr>`;
                } else {
                    shiftResults.forEach(res => {
                        const row = `<tr class="animate__animated animate__fadeInUp">
                            <td>${res.date}</td>
                            <td><strong>${res.name}</strong></td>
                            <td><span style="color:#ff6b6b; font-weight:bold;">${res.time}</span></td>
                        </tr>`;
                        resultBody.insertAdjacentHTML('beforeend', row);
                    });
                }

            } catch (error) {
                console.error(error);
                status.innerHTML = '❌ エラーが発生しちゃった。写真をもう一度選んでみてね。';
                status.style.background = '#fff0f2';
                status.style.color = '#ff6b6b';
            }
        };
    });
</script>
</body>
</html>
